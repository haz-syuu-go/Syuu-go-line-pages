<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新着情報｜静蓮寺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:        #4a7c59;
    --accent-light:  #eaf2eb;
    --accent-mid:    #c5d9c8;
    --accent-subtle: #f2f7f3;
    --text-primary:  #1a1a1a;
    --text-secondary:#555555;
    --text-muted:    #888888;
    --border:        #e0e0e0;
    --bg:            #ffffff;
    --bg-surface:    #f5faf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.9;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: var(--bg); }

  .news-header {
    background: var(--accent);
    color: #ffffff;
    padding: 18px 16px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .news-header-title { font-size: 18px; font-weight: 700; }
  .news-header-icon { flex-shrink: 0; }

  /* Tab grid */
  .tab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 14px 0;
  }
  .tab-btn {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    font-size: 13px; font-weight: 700;
    color: var(--text-muted);
    background: var(--bg);
    text-align: center;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .tab-btn .tab-num { font-size: 10px; opacity: 0.6; }
  .tab-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .news-list { padding: 18px 14px 24px; }
  .news-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
    background: var(--bg);
  }
  .news-img-placeholder {
    width: 100%;
    height: 160px;
    background: var(--accent-subtle);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent-mid);
  }
  .news-content { padding: 14px; }
  .news-meta {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .news-tag {
    font-size: 11px;
    background: #f0ede8;
    color: #666;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
  }
  .news-date {
    font-size: 11px;
    color: var(--text-muted);
  }
  .news-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 6px;
    color: var(--text-primary);
  }
  .news-excerpt {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.9;
    margin-bottom: 10px;
  }
  .news-btn {
    display: block;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    color: var(--text-primary);
    text-decoration: none;
    background: var(--bg);
  }

  .empty-msg {
    padding: 40px 16px;
    text-align: center;
    font-size: 14px;
    color: var(--text-muted);
  }

  .footer-bar {
    background: var(--accent);
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    text-align: center;
    padding: 14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="news-header">
    <div class="news-header-title">静蓮寺｜新着情報</div>
    <div class="news-header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>
  </div>

  <div class="tab-grid">
    <div class="tab-btn active" data-filter="all"><span class="tab-num">01</span>すべて</div>
    <div class="tab-btn" data-filter="お知らせ"><span class="tab-num">02</span>お知らせ</div>
    <div class="tab-btn" data-filter="行事・催し"><span class="tab-num">03</span>行事・催し</div>
    <div class="tab-btn" data-filter="その他"><span class="tab-num">04</span>その他</div>
  </div>

  <div class="news-list">

    <div class="news-card" data-category="お知らせ">
      <div class="news-img-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <line x1="10" y1="9" x2="8" y2="9"></line>
        </svg>
      </div>
      <div class="news-content">
        <div class="news-meta">
          <span class="news-tag">お知らせ</span>
          <span class="news-date">更新日：2025.12.29</span>
        </div>
        <div class="news-title">寺報「和顔愛語」令和7年12月号発行のお知らせ</div>
        <div class="news-excerpt">寺報の最新号が発行されました…</div>
        <a href="#" class="news-btn">詳細を見る →</a>
      </div>
    </div>

    <div class="news-card" data-category="お知らせ">
      <div class="news-img-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <line x1="10" y1="9" x2="8" y2="9"></line>
        </svg>
      </div>
      <div class="news-content">
        <div class="news-meta">
          <span class="news-tag">お知らせ</span>
          <span class="news-date">更新日：2025.07.14</span>
        </div>
        <div class="news-title">寺報「和顔愛語」令和7年7月号発行のお知らせ</div>
        <div class="news-excerpt">寺報の最新号が発行されました…</div>
        <a href="#" class="news-btn">詳細を見る →</a>
      </div>
    </div>

    <div class="news-card" data-category="お知らせ">
      <div class="news-img-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <line x1="10" y1="9" x2="8" y2="9"></line>
        </svg>
      </div>
      <div class="news-content">
        <div class="news-meta">
          <span class="news-tag">お知らせ</span>
          <span class="news-date">更新日：2025.03.14</span>
        </div>
        <div class="news-title">寺報「和顔愛語」令和7年3月号発行のお知らせ</div>
        <div class="news-excerpt">寺報の最新号が発行されました…</div>
        <a href="#" class="news-btn">詳細を見る →</a>
      </div>
    </div>

    <div class="empty-msg" style="display:none;">該当する記事がありません</div>

  </div>

  <footer class="footer-bar">© 静蓮寺</footer>

</div>

<script>
  const tabs = document.querySelectorAll('.tab-btn');
  const cards = document.querySelectorAll('.news-card');
  const emptyMsg = document.querySelector('.empty-msg');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const filter = tab.dataset.filter;

      let shown = 0;
      cards.forEach(card => {
        const cat = card.dataset.category;
        if (filter === 'all' || cat === filter) {
          card.style.display = '';
          shown++;
        } else {
          card.style.display = 'none';
        }
      });
      emptyMsg.style.display = shown === 0 ? 'block' : 'none';
    });
  });
</script>
</body>
</html>
