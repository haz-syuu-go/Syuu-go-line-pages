<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静蓮寺へLINEで相談する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:        #4a7c59;
    --accent-light:  #eaf2eb;
    --accent-mid:    #c5d9c8;
    --accent-subtle: #f2f7f3;
    --text-primary:  #1a1a1a;
    --text-secondary:#555555;
    --text-muted:    #888888;
    --border:        #e0e0e0;
    --bg:            #ffffff;
    --bg-surface:    #f5faf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.9;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: var(--bg); padding-bottom: 24px; }

  .page-header {
    background: var(--accent);
    color: #ffffff;
    padding: 18px 16px 16px;
  }
  .page-header-title { font-size: 18px; font-weight: 700; line-height: 1.5; margin-bottom: 12px; }

  /* LINE button */
  .line-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #06c755; color: #fff;
    border-radius: 10px; padding: 14px;
    font-size: 15px; font-weight: 700;
    text-decoration: none;
  }
  .line-btn.in-header {
    background: #ffffff;
    color: var(--accent);
  }
  .line-btn.in-header svg { fill: var(--accent); }

  .line-icon { flex-shrink: 0; }

  /* Chat animation area */
  .chat-anim-area {
    background: #f0ede8;
    padding: 18px 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .bubble-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  .bubble-row.right { flex-direction: row-reverse; }

  .bubble-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: #6b5a3e; color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .bubble-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .bubble-avatar.user { background: var(--accent); }

  .bubble {
    max-width: 70%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13px; line-height: 1.7;
    color: var(--text-primary);
    background: #fff;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.4s ease forwards;
  }
  .bubble.right {
    background: var(--accent);
    color: #fff;
    border-radius: 14px 14px 2px 14px;
  }
  .bubble.left { border-radius: 14px 14px 14px 2px; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .b1 { animation-delay: 0.3s; }
  .b2 { animation-delay: 1.1s; }
  .b3 { animation-delay: 2.2s; }

  .dot-anim {
    display: flex; gap: 4px; align-items: center;
    padding: 4px 0;
  }
  .dot-anim span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #999;
    animation: bounce 1.2s infinite;
  }
  .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }

  /* Section padding */
  .pad-x { padding-left: 14px; padding-right: 14px; }
  .mt-14 { margin-top: 14px; }

  /* 住職カード */
  .chat-info-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 14px 14px 0;
    overflow: hidden;
  }
  .chat-profile {
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .chat-profile-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: #6b5a3e; color: #fff;
    font-size: 18px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden;
  }
  .chat-profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .chat-profile-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
  .chat-status {
    font-size: 11px; color: var(--accent);
    display: flex; align-items: center; gap: 4px;
  }
  .chat-status::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); display: inline-block;
  }
  .chat-info-rows { padding: 4px 14px 12px; }
  .chat-info-row {
    display: flex; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dotted var(--border);
    font-size: 13px;
    line-height: 1.7;
  }
  .chat-info-row:last-child { border-bottom: none; }
  .chat-info-label {
    width: 72px; flex-shrink: 0;
    font-size: 12px; color: var(--text-muted); font-weight: 700;
    padding-top: 2px;
  }
  .chat-info-value { flex: 1; color: var(--text-primary); }

  /* 注意書き */
  .chat-note {
    margin: 14px 14px 0;
    background: var(--accent-subtle);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.9;
  }
  .chat-notes-list { padding-left: 18px; }
  .chat-notes-list li { margin-bottom: 4px; }
  .chat-notes-list li:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-header">
    <div class="page-header-title">静蓮寺へLINEで相談する</div>
    <a href="line://lin.ee/5XPp6PB" class="line-btn in-header">
      <svg class="line-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.02 2 11c0 3.07 1.6 5.78 4.07 7.5L5 22l4.09-2.1C9.99 20.27 11 20.5 12 20.5c5.52 0 10-4.02 10-9S17.52 2 12 2z"/>
      </svg>
      メッセージを送る
    </a>
  </div>

  <!-- ── Chat animation ── -->
  <div class="chat-anim-area">
    <div class="bubble-row right">
      <div class="bubble-avatar user">私</div>
      <div class="bubble right b1">法事のことでご相談があります</div>
    </div>

    <div class="bubble-row">
      <div class="bubble-avatar">
        <img src="./images/jorenji_priest.jpg" alt="住職" onerror="this.style.display='none';this.parentElement.textContent='寺';">
      </div>
      <div class="bubble left b2">
        <div class="dot-anim"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="bubble-row">
      <div class="bubble-avatar">
        <img src="./images/jorenji_priest.jpg" alt="住職" onerror="this.style.display='none';this.parentElement.textContent='寺';">
      </div>
      <div class="bubble left b3">ありがとうございます。どのようなことでもお気軽にどうぞ。</div>
    </div>
  </div>

  <!-- ── 中部LINEボタン ── -->
  <div class="pad-x mt-14">
    <a href="line://lin.ee/5XPp6PB" class="line-btn">
      <svg class="line-icon" width="20" height="20" viewBox="0 0 24 24" fill="#fff">
        <path d="M12 2C6.48 2 2 6.02 2 11c0 3.07 1.6 5.78 4.07 7.5L5 22l4.09-2.1C9.99 20.27 11 20.5 12 20.5c5.52 0 10-4.02 10-9S17.52 2 12 2z"/>
      </svg>
      メッセージを送る
    </a>
  </div>

  <!-- ── 住職情報カード ── -->
  <div class="chat-info-card">
    <div class="chat-profile">
      <div class="chat-profile-avatar">
        <img src="./images/jorenji_priest.jpg" alt="住職" onerror="this.style.display='none';this.parentElement.textContent='寺';">
      </div>
      <div class="chat-profile-info">
        <div class="chat-name">住職・静蓮寺</div>
        <div class="chat-status">ご相談を受け付け中</div>
      </div>
    </div>
    <div class="chat-info-rows">
      <div class="chat-info-row">
        <div class="chat-info-label">受付時間</div>
        <div class="chat-info-value">24時間いつでも</div>
      </div>
      <div class="chat-info-row">
        <div class="chat-info-label">返信目安</div>
        <div class="chat-info-value">2日以内／日中おつとめの合間にお返事いたします</div>
      </div>
      <div class="chat-info-row">
        <div class="chat-info-label">その他</div>
        <div class="chat-info-value">葬式やお急ぎの場合はお電話にてご連絡ください</div>
      </div>
    </div>
  </div>

  <!-- ── 注意書き ── -->
  <div class="chat-note">
    <ul class="chat-notes-list">
      <li>24時間いつでもお送りいただけます</li>
      <li>送っていただいた内容は、他の方には閲覧されません。ご安心ください。</li>
    </ul>
  </div>

  <!-- ── 下部LINEボタン ── -->
  <div class="pad-x mt-14">
    <a href="line://lin.ee/5XPp6PB" class="line-btn">
      <svg class="line-icon" width="20" height="20" viewBox="0 0 24 24" fill="#fff">
        <path d="M12 2C6.48 2 2 6.02 2 11c0 3.07 1.6 5.78 4.07 7.5L5 22l4.09-2.1C9.99 20.27 11 20.5 12 20.5c5.52 0 10-4.02 10-9S17.52 2 12 2z"/>
      </svg>
      メッセージを送る
    </a>
  </div>

</div>
</body>
</html>
