<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年間行事のご案内｜静蓮寺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:        #4a7c59;
    --accent-light:  #eaf2eb;
    --accent-mid:    #c5d9c8;
    --accent-subtle: #f2f7f3;
    --text-primary:  #1a1a1a;
    --text-secondary:#555555;
    --text-muted:    #888888;
    --border:        #e0e0e0;
    --bg:            #ffffff;
    --bg-surface:    #f5faf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.9;
    font-size: 18px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: var(--bg); }

  /* Carousel */
  .carousel {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
    background: #1a1a1a;
  }
  .carousel-slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.6s ease-in-out;
  }
  .carousel-slide.active { opacity: 1; }
  .carousel-slide img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .carousel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }
  .carousel-dots {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
  }
  .carousel-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transition: background 0.3s, transform 0.3s;
  }
  .carousel-dot.active {
    background: #fff;
    transform: scale(1.2);
  }

  .page-header {
    background: var(--accent);
    color: #ffffff;
    padding: 18px 16px 14px;
  }
  .page-header-title { font-size: 20px; font-weight: 700; line-height: 1.5; }
  .page-header-sub { font-size: 15px; opacity: 0.75; margin-top: 4px; line-height: 1.7; }

  .timeline { padding: 22px 16px 32px; }

  .tl-row {
    display: flex; gap: 14px;
    margin-bottom: 4px;
  }
  .tl-left {
    display: flex; flex-direction: column; align-items: center;
    width: 36px; flex-shrink: 0;
  }
  .tl-month {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
    color: var(--text-primary); line-height: 1;
    flex-shrink: 0;
  }
  .tl-month .unit { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-top: 1px; }
  .tl-month.next { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tl-month.next .unit { color: rgba(255,255,255,0.7); }
  .tl-line {
    width: 2px; flex: 1;
    background: var(--accent-mid);
    min-height: 14px;
    margin: 6px 0;
  }
  .tl-body { flex: 1; padding-bottom: 18px; }

  .ev-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    background: var(--bg);
    position: relative;
  }
  .ev-card.next-event {
    border-color: var(--accent-mid);
    background: var(--accent-subtle);
  }
  .next-badge {
    position: absolute; top: -1px; right: -1px;
    background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 700;
    padding: 2px 10px; border-radius: 0 8px 0 6px;
  }
  .ev-name { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 3px; color: var(--text-primary); }
  .ev-name.next { color: var(--accent); }
  .ev-ruby { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  .ev-date { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .ev-date.next { color: var(--accent); }
  .ev-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.8; }
  .ev-link {
    display: none;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--accent-mid);
    font-size: 15px; color: var(--accent); font-weight: 700;
    text-decoration: none;
  }

  .footer-bar {
    background: var(--accent);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    text-align: center;
    padding: 14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="carousel" id="carousel">
    <div class="carousel-slide active">
      <img src="./images/jorenji_carousel_1.jpg" alt="静蓮寺 本堂">
    </div>
    <div class="carousel-slide">
      <img src="./images/jorenji_carousel_2.jpg" alt="静蓮寺 法要の様子">
    </div>
    <div class="carousel-slide">
      <img src="./images/jorenji_carousel_3.jpg" alt="静蓮寺 住職">
    </div>
    <div class="carousel-overlay"></div>
    <div class="carousel-dots">
      <div class="carousel-dot active"></div>
      <div class="carousel-dot"></div>
      <div class="carousel-dot"></div>
    </div>
  </div>

  <div class="page-header">
    <div class="page-header-title">年間行事のご案内</div>
    <div class="page-header-sub">どなたさまもお気軽にお参りください</div>
  </div>

  <div class="timeline">

    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-month">3<span class="unit">月</span></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-body">
        <div class="ev-card" data-date="2026-03-18">
          <div class="ev-name">春彼岸会</div>
          <div class="ev-ruby">しゅんきひがんえ</div>
          <div class="ev-date">春分の日 前後3日間</div>
          <div class="ev-desc">ご先祖の供養とご自身の修行の機会です。</div>
        </div>
      </div>
    </div>

    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-month">5<span class="unit">月</span></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-body">
        <div class="ev-card" data-date="2026-05-24">
          <div class="ev-name">お施餓鬼会</div>
          <div class="ev-ruby">おせがきえ</div>
          <div class="ev-date">5月24日</div>
          <div class="ev-desc">施餓鬼供養。どなたでもご参加いただけます。</div>
          <a href="#" class="ev-link">詳細を見る →</a>
        </div>
      </div>
    </div>

    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-month">7<span class="unit">月</span></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-body">
        <div class="ev-card" data-date="2026-07-15">
          <div class="ev-name">新盆法要</div>
          <div class="ev-ruby">しんぼんほうよう</div>
          <div class="ev-date">7月中旬</div>
          <div class="ev-desc">今年初めて迎えるお盆の法要です。</div>
        </div>
      </div>
    </div>

    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-month">7<span class="unit">月</span></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-body">
        <div class="ev-card" data-date="2026-07-26">
          <div class="ev-name">雅楽の演奏会</div>
          <div class="ev-ruby">ががくのえんそうかい</div>
          <div class="ev-date">7月最終日曜日</div>
          <div class="ev-desc">境内で雅楽を楽しむひとときです。</div>
        </div>
      </div>
    </div>

    <div class="tl-row">
      <div class="tl-left">
        <div class="tl-month">9<span class="unit">月</span></div>
      </div>
      <div class="tl-body">
        <div class="ev-card" data-date="2026-09-20">
          <div class="ev-name">秋彼岸会</div>
          <div class="ev-ruby">しゅうきひがんえ</div>
          <div class="ev-date">秋分の日 前後3日間</div>
          <div class="ev-desc">秋のお彼岸。お墓参りとご一緒に。</div>
        </div>
      </div>
    </div>

  </div>

  <footer class="footer-bar">© 静蓮寺</footer>

</div>

<script>
  // Carousel (slow fade, 6s interval)
  (function() {
    const slides = document.querySelectorAll('.carousel-slide');
    const dots   = document.querySelectorAll('.carousel-dot');
    if (slides.length < 2) return;
    let idx = 0;
    setInterval(() => {
      slides[idx].classList.remove('active');
      dots[idx].classList.remove('active');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('active');
      dots[idx].classList.add('active');
    }, 6000);
  })();

  document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const events = document.querySelectorAll('[data-date]');
    let nextFound = false;

    events.forEach(el => {
      const d = new Date(el.dataset.date);
      if (!nextFound && d >= today) {
        nextFound = true;
        el.classList.add('next-event');
        const badge = document.createElement('div');
        badge.className = 'next-badge';
        badge.textContent = '次の行事';
        el.prepend(badge);

        const monthEl = el.closest('.tl-row').querySelector('.tl-month');
        if (monthEl) monthEl.classList.add('next');

        const nameEl = el.querySelector('.ev-name');
        const dateEl = el.querySelector('.ev-date');
        if (nameEl) nameEl.classList.add('next');
        if (dateEl) dateEl.classList.add('next');

        const linkEl = el.querySelector('.ev-link');
        if (linkEl && linkEl.getAttribute('href') && linkEl.getAttribute('href') !== '#') {
          linkEl.style.display = 'block';
        }
      }
    });
  });
</script>
</body>
</html>
