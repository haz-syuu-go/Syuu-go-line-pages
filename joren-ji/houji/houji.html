<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご法事のご案内｜静蓮寺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:        #4a7c59;
    --accent-light:  #eaf2eb;
    --accent-mid:    #c5d9c8;
    --accent-subtle: #f2f7f3;
    --text-primary:  #1a1a1a;
    --text-secondary:#555555;
    --text-muted:    #888888;
    --border:        #e0e0e0;
    --bg:            #ffffff;
    --bg-surface:    #f5faf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.9;
    font-size: 18px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: var(--bg); }

  .hero {
    width: 100%;
    height: 200px;
    background: linear-gradient(135deg, var(--accent) 0%, #3a6446 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .hero-fallback {
    color: rgba(255,255,255,0.6);
    font-size: 15px;
    letter-spacing: 2px;
  }

  .page-intro { padding: 22px 16px 8px; }
  .page-title {
    font-size: 22px; font-weight: 700;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .page-lead {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .menu-list { padding: 18px 16px 24px; }
  .menu-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg);
    text-decoration: none;
    color: inherit;
  }
  .menu-card.active { border-color: var(--accent); }
  .menu-card.disabled { opacity: 0.38; pointer-events: none; cursor: default; }

  .num-badge {
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .num-badge.gray { background: #aaaaaa; }

  .menu-body { flex: 1; min-width: 0; }
  .menu-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .menu-icon { flex-shrink: 0; display: flex; }
  .menu-title { font-size: 17px; font-weight: 700; line-height: 1.5; }
  .menu-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.8; }

  .menu-note {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 15px;
    color: #a8501a;
    background: #fff1e0;
    border: 1px solid #f0c896;
    border-radius: 6px;
    padding: 9px 10px;
    margin-top: 8px;
    line-height: 1.75;
    font-weight: 500;
  }
  .menu-note .note-icon { flex-shrink: 0; margin-top: 2px; color: #d97732; }

  .menu-arrow {
    flex-shrink: 0;
    align-self: center;
    color: var(--accent);
  }
  .menu-card.disabled .menu-arrow { color: #aaa; }

  .footer-info {
    background: var(--accent-subtle);
    padding: 18px 16px;
    margin-top: 8px;
  }
  .footer-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .footer-row {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.9;
  }
  .footer-row a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
  }

  .footer-bar {
    background: var(--accent);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    text-align: center;
    padding: 14px;
  }
</style>
</head>
<body>

          <polyline points="9 18 15 12 9 6"></polyline>

  <div class="footer-info">
