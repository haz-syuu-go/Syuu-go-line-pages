<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご法事のご案内｜東林寺</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:        #4a7c59;
    --accent-light:  #eaf2eb;
    --accent-mid:    #c5d9c8;
    --accent-subtle: #f2f7f3;
    --text-primary:  #1a1a1a;
    --text-secondary:#555555;
    --text-muted:    #888888;
    --border:        #e0e0e0;
    --bg:            #ffffff;
    --bg-surface:    #f5faf5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.9;
    font-size: 18px;
    -webkit-text-size-adjust: 100%;
  }
  .wrap { max-width: 480px; margin: 0 auto; background: var(--bg); }

  .hero {
    position: relative;
    width: 100%;
    height: 240px;
    background: linear-gradient(135deg, var(--accent) 0%, #3a6446 100%);
    overflow: hidden;
  }
  .hero-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 1.4s ease-in-out;
  }
  .hero-slide.active { opacity: 1; }
  .hero-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero-fallback {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6);
    font-size: 15px;
    letter-spacing: 2px;
  }
  .hero-dots {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 2;
  }
  .hero-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.55);
    transition: background 0.3s, transform 0.3s;
  }
  .hero-dot.active { background: #fff; transform: scale(1.25); }

  .page-intro { padding: 22px 16px 8px; }
  .page-title {
    font-size: 22px; font-weight: 700;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .page-lead {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .menu-list { padding: 18px 16px 24px; }
  .menu-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    margin-bottom: 0;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--bg);
    text-decoration: none;
    color: inherit;
  }

  /* カード間コネクター（縦線＋矢印） */
  .menu-connector {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 28px;
    position: relative;
  }
  .menu-connector::before {
    content: '';
    position: absolute;
    left: 27px; /* num-badge 中心に合わせる */
    top: 0; bottom: 0;
    width: 2px;
    background: var(--accent-mid);
  }
  .menu-conn-arrow {
    font-size: 15px;
    color: var(--accent);
    background: var(--bg);
    padding: 0 8px;
    position: relative;
    z-index: 1;
    font-weight: 700;
  }
  .menu-card.active { border-color: var(--accent); }
  .menu-card.disabled { opacity: 0.38; pointer-events: none; cursor: default; }

  .num-badge {
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .num-badge.gray { background: #aaaaaa; }

  .menu-body { flex: 1; min-width: 0; }
  .menu-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .menu-icon { flex-shrink: 0; display: flex; }
  .menu-title { font-size: 17px; font-weight: 700; line-height: 1.5; }
  .menu-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.8; }

  .menu-note {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 15px;
    color: #a8501a;
    background: #fff1e0;
    border: 1px solid #f0c896;
    border-radius: 6px;
    padding: 9px 10px;
    margin-top: 8px;
    line-height: 1.75;
    font-weight: 500;
  }
  .menu-note .note-icon { flex-shrink: 0; margin-top: 2px; color: #d97732; }

  .menu-arrow {
    flex-shrink: 0;
    align-self: center;
    color: var(--accent);
  }
  .menu-card.disabled .menu-arrow { color: #aaa; }
  .prep-badge {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    background: #eeeeee; color: #888888;
    border-radius: 4px; padding: 2px 8px;
    margin-left: 6px; vertical-align: middle;
  }

  .footer-info {
    background: var(--accent-subtle);
    padding: 18px 16px;
    margin-top: 8px;
  }
  .footer-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .footer-row {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.9;
  }
  .footer-row a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
  }

  .footer-bar {
    background: var(--accent);
    color: rgba(255,255,255,0.75);
    font-size: 14px;
    text-align: center;
    padding: 14px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero hero-carousel">
    <div class="hero-slide active"><img src="../images/tourinji_houji_1.jpg" alt="東林寺 本堂"></div>
    <div class="hero-slide"><img src="../images/tourinji_houji_2.jpg" alt="東林寺 広間"></div>
    <div class="hero-slide"><img src="../images/tourinji_houji_3.jpg" alt="東林寺 阿弥陀如来"></div>
    <div class="hero-fallback" style="display:none;">東林寺</div>
    <div class="hero-dots">
      <span class="hero-dot active"></span>
      <span class="hero-dot"></span>
      <span class="hero-dot"></span>
    </div>
  </div>

  <div class="page-intro">
    <div class="page-title">ご法事のご案内</div>
    <div class="page-lead">日程のご相談から当日のご準備まで、安心してお迎えいただけるようご案内します。</div>
  </div>

  <div class="menu-list">

    <a class="menu-card active" href="#">
      <div class="num-badge">01</div>
      <div class="menu-body">
        <div class="menu-row">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>

            </svg>
          </div>
          <div class="menu-title">日程のご相談</div>

        <div class="menu-desc">法要の日時をご相談・ご予約いただけます。</div>
        <div class="menu-note">
          <span class="note-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>

        </div>
      </div>
      <div class="menu-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </a>

    <div class="menu-connector"><span class="menu-conn-arrow">↓</span></div>

    <a class="menu-card active" href="./list.html">
      <div class="num-badge">02</div>
      <div class="menu-body">
        <div class="menu-row">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
          </div>
          <div class="menu-title">ご法事前のチェックリスト</div>
        </div>
        <div class="menu-desc">当日の持ち物・準備事項をご確認ください。</div>
      </div>
      <div class="menu-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </a>

    <div class="menu-connector"><span class="menu-conn-arrow">↓</span></div>

    <a class="menu-card active" href="./flow.html">
      <div class="num-badge">03</div>
      <div class="menu-body">
        <div class="menu-row">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="menu-title">当日の流れ</div>
        </div>
        <div class="menu-desc">当日の進行・服装についてご案内します。</div>
      </div>
      <div class="menu-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    </a>

  </div>

  <div class="footer-info">
    <div class="footer-name">浄土真宗本願寺派 東林寺</div>
    <div class="footer-row">北海道虻田郡倶知安町北五条東2丁目</div>
    <div class="footer-row">電話：<a href="#">（準備中）</a></div>
  </div>

  <footer class="footer-bar">© 東林寺</footer>

</div>
<script>
(function() {
  var slides = document.querySelectorAll('.hero-carousel .hero-slide');
  var dots = document.querySelectorAll('.hero-carousel .hero-dot');
  if (slides.length < 2) return;
  var idx = 0;
  setInterval(function() {
    slides[idx].classList.remove('active');
    if (dots[idx]) dots[idx].classList.remove('active');
    idx = (idx + 1) % slides.length;
    slides[idx].classList.add('active');
    if (dots[idx]) dots[idx].classList.add('active');
  }, 5000);
})();
</script>
<script>
(function() {
  var ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:9999;opacity:1;transition:opacity 0.35s ease;pointer-events:none;';
  document.body.appendChild(ov);
  requestAnimationFrame(function() { requestAnimationFrame(function() { ov.style.opacity = '0'; }); });
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a[href]');
    if (!a) return;
    var href = a.getAttribute('href');
    if (!href || href === '#' || /^(https?:|tel:|mailto:)/.test(href)) return;
    e.preventDefault();
    ov.style.transition = 'opacity 0.25s ease';
    ov.style.opacity = '1';
    ov.style.pointerEvents = 'all';
    setTimeout(function() { window.location.href = a.href; }, 260);
  });
})();
</script>
</body>
</html>
